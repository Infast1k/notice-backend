target-version = "py312"
line-length = 120

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "D",
]

ignore = [
    "D400",  # docstring: заканчивается ли первая строка точкой
    "D403",  # docstring: первый символ, не являющийся пробелом, документации должен быть написан заглавной буквой
    "D401",  # docstring: первая строка должна быть в повелительном наклонении
    "D205",  # docstring: между краткой информацией и описанием должна быть одна пустая строка 
    "I001",  # imports: блок импорта не отсортирован или не отформатирован 
]

[lint.per-file-ignores]
"**/__init__.py" = ["D"]

[lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "single"
docstring-quotes = "single"

[lint.pydocstyle]
convention = "pep257"

[format]
quote-style = "single"
