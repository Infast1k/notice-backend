repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [ --fix ]
        stages: [pre-commit]

      - id: ruff-format
        stages: [pre-commit]

      - id: ruff
        args: [ --no-fix ]
        stages: [pre-push]

      - id: ruff-format
        args: [ --check ]
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
